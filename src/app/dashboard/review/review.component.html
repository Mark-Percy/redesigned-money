<p>{{ currDate.getFullYear() }}</p>
<table mat-table [dataSource]="yearAmounts">
    <ng-container matColumnDef="Month">
        <th mat-header-cell *matHeaderCellDef>Month</th>
        <td mat-cell *matCellDef="let yearAmounts"> {{yearAmounts.month}} </td>
    </ng-container>
    <ng-container matColumnDef="Amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let yearAmounts"> {{yearAmounts.amount}} </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedCols; sticky:true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedCols;"></tr>
</table>
